services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    Mandrael\EventTagsBundle\:
        resource: '../../*'
        exclude:
            - '../../Resources/contao'
            - '../../Resources/public'
            - '../../ContaoManager'
            - '../../MandraelEventTagsBundle.php'

    Mandrael\EventTagsBundle\Helper\TagsHelper:
        public: true

    # label_callback (tl_event_tags): von Contao über den Container aufgelöst -> public
    Mandrael\EventTagsBundle\EventListener\TagLabelListener:
        public: true

    # Der Listener für den Hook
    Mandrael\EventTagsBundle\EventListener\EventFilterListener:
        tags:
            - { name: contao.hook, hook: getAllEvents }
